services:
  backend:
    build: .
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    depends_on:
      - mysql
      - vault
    environment:
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=
      - DB_NAME=minsat
      - VAULT_ADDR=http://minsat-vault:8200
      - VAULT_TOKEN=dev-root-token
      - NODE_ENV=development
      - JWT_SECRET=OrangeMinsat2025
      - AIR_AUTH='Basic a2FkZTprYWRlMTIzCg=='
      - AIR_URL='http://10.13.0.53:10010/Air'
      - MAIL_USER=maysiwar96@gmail.com
      - MAIL_PASS=oiefqkytotllwurq
    networks:
      - minsat-net
  mysql:
    image: mysql:8
    restart: always
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: minsat
    volumes:
      - mysql_data:/var/lib/mysql
      - ./minsat.sql:/docker-entrypoint-initdb.d/minsat.sql
    networks:
      - minsat-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    
  vault:
    image: vault:1.13.3
    container_name: minsat-vault
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=dev-root-token
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_STORAGE_BACKEND=file
      - VAULT_STORAGE_FILE_PATH=/vault/file
    ports:
      - "8200:8200"
    command: vault server -dev
    networks:
      - minsat-net
    volumes:
      - vault-data:/vault/file
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8200/v1/sys/health"]
      interval: 5s
      timeout: 5s
      retries: 10
    
  phpmyadmin:
      image: phpmyadmin/phpmyadmin
      container_name: phpmyadmin
      restart: always
      ports:
        - "8080:80"
      environment:
        PMA_HOST: mysql
      depends_on:
        - mysql
      networks:
        - minsat-net
networks:
  minsat-net:

volumes:
  mysql_data:
  vault-data:
