stages:
  - scan
  - build

sonarqube_scan:
  stage: scan
  image: sonarsource/sonar-scanner-cli:latest
  variables:
    SONAR_HOST_URL: "http://192.168.1.161:9000"
    SONAR_LOGIN: "squ_cf3650847c430a218bc0dbb4282c95cb6b7f4e8f"
  script:
    - sonar-scanner -Dsonar.projectKey=Api_History -Dsonar.sources=. -Dsonar.host.url=$SONAR_HOST_URL -Dsonar.login=$SONAR_LOGIN

  allow_failure: true
Api_History-build:
  stage: build
  image:
    name: docker:stable
  variables:
    DOCKER_HOST: tcp://192.168.1.156:2375/
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - apk add --no-cache curl tar
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
    - export TRIVY_VERSION=$(wget -qO - "https://api.github.com/repos/aquasecurity/trivy/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
    - echo $TRIVY_VERSION
    - wget --no-verbose https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
    - tar zxvf trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz
    - mv trivy /usr/local/bin/
  script:
    - docker build -t $CI_REGISTRY_IMAGE:test5 -f Dockerfile .
    - docker push $CI_REGISTRY_IMAGE:test5
    - trivy image --exit-code 0 --cache-dir .trivycache/ --no-progress --format table -o trivy_report.txt $CI_REGISTRY_IMAGE:test5
    - trivy image --exit-code 0 --cache-dir .trivycache/ --no-progress --severity HIGH $CI_REGISTRY_IMAGE:test5
    - trivy image --exit-code 1 --cache-dir .trivycache/ --severity CRITICAL --no-progress $CI_REGISTRY_IMAGE:test5
  cache:
    paths:
      - .trivycache/
  artifacts:
    paths:
      - trivy_report.txt
