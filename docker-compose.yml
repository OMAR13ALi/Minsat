services:
  mysql:
    image: mysql:8.0
    container_name: minsat-mysql
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: minsat
    volumes:
      - minsat-db:/var/lib/mysql
      - ./backend-minsat-main/minsat.sql:/docker-entrypoint-initdb.d/minsat.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-history:
    build: ./api_history
    container_name: api_history
    ports:
      - "5002:5002"
    volumes:
      - ./api_history:/app
    environment:
      - FLASK_ENV=development

  air-mock:
    build: ./air-mock
    container_name: air-mock
    ports:
      - "10010:8080"

  ucip-wrapper:
    build:
      context: ./ucip-wrapper
      dockerfile: Dockerfile
    container_name: ucip-wrapper
    expose:
      - "8080"
    environment:
      AIR_HOST: air-mock
      AIR_PORT: 8080
      AIR_USER: kade
      AIR_PASSWORD: kade123
      AIR_NODE_TYPE: EXT
      AIR_HOST_NAME: minsat
      AIR_TIMEOUT_MS: 10000
      AIR_DEBUG: "true"
    depends_on:
      - air-mock
    restart: unless-stopped

  backend:
    build:
      context: ./backend-minsat-spring
      dockerfile: Dockerfile
    container_name: spring-backend
    ports:
      - "5000:5000"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/minsat?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ""
      UCIP_BASE_URL: http://ucip-wrapper:8080
    depends_on:
      mysql:
        condition: service_healthy
      ucip-wrapper:
        condition: service_started
    restart: unless-stopped

  frontend:
    build: ./projet_orange
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
      - ucip-wrapper

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    ports:
      - "8888:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
    depends_on:
      - mysql

volumes:
  minsat-db: